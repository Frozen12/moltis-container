name: Build & Push Moltis Container Image

on:
  workflow_run:
    workflows: ["Check Upstream Moltis"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: moltis-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Check if digest changed
        id: check_digest
        run: |
          if git diff --name-only HEAD~1 | grep -q ".upstream_digest"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no change
        if: steps.check_digest.outputs.changed == 'false'
        run: |
          echo "No upstream change detected. Skipping build."
          exit 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Prepare metadata
        id: meta
        run: |
          set -euo pipefail

          DIGEST=$(cat .upstream_digest)
          SHORT=$(echo "$DIGEST" | cut -c8-19)
          DATE=$(date -u +%Y%m%d)

          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "short=$SHORT" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            meshpotato/moltis:latest
            meshpotato/moltis:sha-${{ steps.meta.outputs.short }}
            meshpotato/moltis:${{ steps.meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build summary
        run: |
          echo "## 🚀 Moltis Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Digest: ${{ steps.meta.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tags:" >> $GITHUB_STEP_SUMMARY
          echo "  - latest" >> $GITHUB_STEP_SUMMARY
          echo "  - sha-${{ steps.meta.outputs.short }}" >> $GITHUB_STEP_SUMMARY
          echo "  - ${{ steps.meta.outputs.date }}" >> $GITHUB_STEP_SUMMARY
