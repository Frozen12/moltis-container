name: Build & Push Moltis Container Image

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [check-upstream]
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # Log upstream moltis version for audit trail
    - name: Log upstream moltis commit
      run: |
        echo "Upstream moltis commit: $(curl -s https://api.github.com/repos/moltis-org/moltis/commits/main | jq -r .sha)"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: |
          meshpotato/moltis:latest
        # amd64 only — ClawCloud uses x86, avoids QEMU emulation issues
        platforms: linux/amd64
        cache-from: type=gha
        cache-to: type=gha,mode=max
