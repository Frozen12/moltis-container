name: Build & Push Moltis Image

on:
  push:
    branches: [ "main" ]

  schedule:
    - cron: "0 3 * * *"   # daily check

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # Install jq (needed for API parsing)
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # Get latest upstream commit (for logging only)
    - name: Get upstream commit
      run: |
        curl -s https://api.github.com/repos/moltis-org/moltis/commits/main \
        | jq -r .sha

    # Setup Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Build & Push image
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          meshpotato/moltis:latest
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max
