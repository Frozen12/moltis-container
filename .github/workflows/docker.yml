name: Build & Push Moltis Image

on:
  push:
    branches: [ "main" ]

  # Run daily to check upstream
  schedule:
    - cron: "0 3 * * *"

  # Manual trigger
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # 🔍 Get latest upstream commit hash
    - name: Get upstream commit
      id: upstream
      run: |
        curl -s https://api.github.com/repos/moltis-org/moltis/commits/main \
        | jq -r .sha > upstream.txt
        echo "sha=$(cat upstream.txt)" >> $GITHUB_OUTPUT

    # 🔍 Check cached commit
    - name: Load cached commit
      id: cache
      run: |
        if [ -f .upstream_sha ]; then
          echo "cached=$(cat .upstream_sha)" >> $GITHUB_OUTPUT
        else
          echo "cached=none" >> $GITHUB_OUTPUT
        fi

    # 🔄 Decide whether to rebuild
    - name: Should build?
      id: decision
      run: |
        if [ "${{ steps.upstream.outputs.sha }}" != "${{ steps.cache.outputs.cached }}" ]; then
          echo "build=true" >> $GITHUB_OUTPUT
        else
          echo "build=false" >> $GITHUB_OUTPUT
        fi

    # 🐳 Set up Docker Buildx
    - name: Set up Docker Buildx
      if: steps.decision.outputs.build == 'true' || github.event_name == 'push'
      uses: docker/setup-buildx-action@v3

    # 🔐 Login to Docker Hub
    - name: Login to Docker Hub
      if: steps.decision.outputs.build == 'true' || github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 🏗️ Build & Push
    - name: Build and push
      if: steps.decision.outputs.build == 'true' || github.event_name == 'push'
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          meshpotato/moltis:latest
          meshpotato/moltis:${{ github.sha }}
        platforms: linux/amd64,linux/arm64

    # 💾 Save upstream commit
    - name: Save upstream commit
      if: steps.decision.outputs.build == 'true'
      run: |
        echo "${{ steps.upstream.outputs.sha }}" > .upstream_sha

    - name: Commit updated upstream SHA
      if: steps.decision.outputs.build == 'true'
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add .upstream_sha
        git commit -m "Update upstream SHA"
        git push
