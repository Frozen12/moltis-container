name: Check & Build Moltis

on:
  schedule:
    # Run twice daily at 08:00 and 20:00 UTC
    - cron: "0 8,20 * * *"
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      old_digest: ${{ steps.check.outputs.old_digest }}
      new_digest: ${{ steps.check.outputs.new_digest }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check upstream ghcr.io version
        id: check
        run: |
          set -euo pipefail

          # Get current digest from GHCR
          NEW_DIGEST=$(curl -s "https://ghcr.io/v2/moltis-org/moltis/manifests/latest" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            | jq -r '.config.digest' 2>/dev/null || echo "")

          if [ -z "$NEW_DIGEST" ]; then
            echo "Failed to fetch GHCR manifest, skipping..."
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "new_digest=" >> $GITHUB_OUTPUT
            echo "old_digest=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "New GHCR digest: $NEW_DIGEST"

          # Read cached digest from git history
          OLD_DIGEST=$(git log --all --oneline --grep="upstream_digest:" -1 2>/dev/null \
            | grep -oP "upstream_digest:\s*\K[a-f0-9:]+" || echo "")

          echo "Old cached digest: $OLD_DIGEST"

          echo "new_digest=$NEW_DIGEST" >> $GITHUB_OUTPUT
          echo "old_digest=$OLD_DIGEST" >> $GITHUB_OUTPUT

          if [ "$OLD_DIGEST" = "$NEW_DIGEST" ]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "No new version detected."
          elif [ -z "$OLD_DIGEST" ]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "No cached digest found — treating as first run."
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "New version detected: $OLD_DIGEST -> $NEW_DIGEST"
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            meshpotato/moltis:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag commit with upstream digest
        env:
          NEW_DIGEST: ${{ needs.check-upstream.outputs.new_digest }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "ci: rebuild for upstream digest $NEW_DIGEST" \
            -m "upstream_digest: $NEW_DIGEST"
          git push