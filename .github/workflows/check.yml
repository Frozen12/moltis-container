name: Check & Build Moltis

on:
  schedule:
    - cron: "0 8,20 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [check-upstream]

permissions:
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      new_digest: ${{ steps.check.outputs.new_digest }}
      old_digest: ${{ steps.check.outputs.old_digest }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Check upstream ghcr.io version
        id: check
        run: |
          set -euo pipefail

          NEW_DIGEST=$(curl -sL "https://ghcr.io/v2/moltis-org/moltis/manifests/latest" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            | jq -r '.digest' 2>/dev/null || echo "")

          if [ -z "$NEW_DIGEST" ]; then
            echo "Failed to fetch GHCR manifest — assuming network issue, skipping."
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "new_digest=" >> $GITHUB_OUTPUT
            echo "old_digest=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "New GHCR digest: $NEW_DIGEST"

          OLD_DIGEST=$(git log --all --oneline --grep="upstream_digest:" -1 2>/dev/null \
            | grep -oP "upstream_digest:\s*\K[a-f0-9:]+" || echo "")

          echo "Cached digest:      $OLD_DIGEST"
          echo "new_digest=$NEW_DIGEST" >> $GITHUB_OUTPUT
          echo "old_digest=$OLD_DIGEST" >> $GITHUB_OUTPUT

          if [ "$OLD_DIGEST" = "$NEW_DIGEST" ]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "No new version — upstream digest unchanged."
          elif [ -z "$OLD_DIGEST" ]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "No cached digest — treating as first run, skipping build."
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "New version detected: $OLD_DIGEST → $NEW_DIGEST"
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            meshpotato/moltis:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag commit with upstream digest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "ci: rebuild for upstream digest ${{ needs.check-upstream.outputs.new_digest }}
upstream_digest: ${{ needs.check-upstream.outputs.new_digest }}"
          git push

      - name: Notify via issue
        if: always()
        env:
          NEW_DIGEST: ${{ needs.check-upstream.outputs.new_digest }}
          OLD_DIGEST: ${{ needs.check-upstream.outputs.old_digest }}
        run: |
          BODY="## Upstream Update Detected\n\nPrevious digest: $OLD_DIGEST\nNew digest: $NEW_DIGEST\n\nTriggered **Build & Push Moltis Container Image** workflow."
          gh issue create \
            --title "Rebuild triggered: upstream digest $NEW_DIGEST" \
            --body "$BODY" \
            --repo Frozen12/moltis-container \
            --label "dispatch,automated"