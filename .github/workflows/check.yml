name: Check & Build Moltis

on:
  schedule:
    # Run twice daily at 08:00 and 20:00 UTC
    - cron: "0 8,20 * * *"
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      needs_build: ${{ steps.check.outputs.needs_build }}
      old_sha: ${{ steps.check.outputs.old_sha }}
      new_sha: ${{ steps.check.outputs.new_sha }}
    steps:
      - name: Checkout repo (workflows only for SHA check)
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/workflows/check.yml
            .github/workflows/build.yml
          sparse-checkout-cone-mode: false

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Check upstream moltis version
        id: check
        run: |
          set -euo pipefail

          NEW_SHA=$(curl -s "https://api.github.com/repos/moltis-org/moltis/commits/main" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.sha')

          echo "New upstream SHA: $NEW_SHA"

          # Read cached SHA from last rebuild commit message
          OLD_SHA=$(git log --oneline -1 --format="%B" 2>/dev/null \
            | grep "^upstream_sha:" | cut -d: -f2 | tr -d ' ' || echo "")

          echo "Old cached SHA: $OLD_SHA"
          echo "new_sha=$NEW_SHA" >> $GITHUB_OUTPUT
          echo "old_sha=$OLD_SHA" >> $GITHUB_OUTPUT

          if [ "$OLD_SHA" = "$NEW_SHA" ] || [ -z "$NEW_SHA" ]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "No new version detected."
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
            echo "New version detected: $OLD_SHA -> $NEW_SHA"
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (full clone — needed for Docker build context + init.sh)
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            meshpotato/moltis:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag rebuild commit with upstream SHA
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "ci: rebuild for upstream ${{ needs.check-upstream.outputs.new_sha }}
upstream_sha:${{ needs.check-upstream.outputs.new_sha }}"
          git push