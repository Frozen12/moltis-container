name: Check Upstream Moltis

on:
  schedule:
    - cron: "0 8,20 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Get upstream digest
        id: check
        run: |
          set -euo pipefail

          echo "Fetching digest from GHCR..."

          HEADERS=$(curl -sI \
            -H "Accept: application/vnd.oci.image.index.v1+json" \
            https://ghcr.io/v2/moltis-org/moltis/manifests/latest || true)

          NEW_DIGEST=$(echo "$HEADERS" \
            | tr -d '\r' \
            | grep -i docker-content-digest \
            | awk '{print $2}' \
            || true)

          if [ -z "$NEW_DIGEST" ]; then
            echo "⚠️ Header method failed, using fallback..."

            NEW_DIGEST=$(curl -s \
              -H "Accept: application/vnd.oci.image.index.v1+json" \
              https://ghcr.io/v2/moltis-org/moltis/manifests/latest \
              | sha256sum | awk '{print "sha256:" $1}' \
              || true)
          fi

          if [ -z "$NEW_DIGEST" ]; then
            echo "❌ Failed to fetch digest"
            exit 0
          fi

          echo "NEW_DIGEST=$NEW_DIGEST" >> $GITHUB_ENV

          OLD_DIGEST=$(cat .upstream_digest 2>/dev/null || echo "")
          echo "OLD_DIGEST=$OLD_DIGEST" >> $GITHUB_ENV

          echo "New: $NEW_DIGEST"
          echo "Old: ${OLD_DIGEST:-<none>}"

          if [ "$OLD_DIGEST" = "$NEW_DIGEST" ]; then
            echo "No change detected."
            echo "changed=false" >> $GITHUB_ENV
          else
            echo "Change detected!"
            echo "changed=true" >> $GITHUB_ENV
          fi

      - name: Trigger docker.yml
        if: env.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering docker workflow..."

          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"check-upstream"}'

      - name: Record digest
        if: env.changed == 'true'
        run: |
          echo "$NEW_DIGEST" > .upstream_digest

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add .upstream_digest
          git commit -m "ci: update upstream digest $NEW_DIGEST" || echo "No changes to commit"
          git push
